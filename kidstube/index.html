<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliška Social Full</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f4f4;
}

.topbar {
  position:sticky;
  top:0;
  background:#1976d2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:520px;
  margin:auto;
  padding:10px;
}

.card {
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#43a047;
  color:white;
  font-weight:bold;
}

.post-video {
  width:100%;
  height:200px;
  border-radius:10px;
}
.small {
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<div class="topbar">🌸 Eliška Social</div>

<div class="container">

<!-- PROFILE -->
<div class="card">
  <input id="username" placeholder="username">
  <input id="display" placeholder="display name">
  <textarea id="bio" placeholder="bio"></textarea>
  <button onclick="saveProfile()">Uložit profil</button>
</div>

<!-- CREATE POST -->
<div class="card">
  <textarea id="text" placeholder="co se děje?"></textarea>
  <input id="video" placeholder="Google Drive video link">
  <button onclick="createPost()">Postnout</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
const supabase = createClient(supabaseUrl, supabaseKey);

let currentUser = null;

// ================= PROFILE =================
window.saveProfile = async function(){
  let user_name = document.getElementById("username").value;
  let display = document.getElementById("display").value;
  let bio = document.getElementById("bio").value;

  await supabase.from("profiles").upsert({
    user_name,
    display_name: display,
    bio
  });

  currentUser = user_name;
  loadFeed();
};

// ================= POSTS =================
window.createPost = async function(){
  let text = document.getElementById("text").value;
  let video = document.getElementById("video").value;

  await supabase.from("posts").insert([{
    user_name: currentUser,
    text,
    video_url: video,
    likes_count: 0
  }]);

  loadFeed();
};

// ================= LIKE =================
window.likePost = async function(id,likes){
  await supabase.from("posts")
  .update({likes_count: likes+1})
  .eq("id", id);

  loadFeed();
};

// ================= FOLLOW =================
window.follow = async function(target){
  await supabase.from("follows").insert([{
    follower: currentUser,
    following: target
  }]);
};

// ================= DRIVE VIDEO =================
function drive(url){
  let id = url.match(/[-\w]{25,}/);
  return id ? `https://drive.google.com/file/d/${id[0]}/preview` : url;
}

// ================= FEED =================
async function loadFeed(){
  let { data } = await supabase
    .from("posts")
    .select("*")
    .order("id", {ascending:false});

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p=>{
    feed.innerHTML += `
    <div class="card">
      <b>@${p.user_name}</b>

      <p>${p.text || ""}</p>

      ${p.video_url ? `<iframe class="post-video" src="${drive(p.video_url)}"></iframe>` : ""}

      <div class="small">❤️ ${p.likes_count || 0}</div>

      <button onclick="likePost(${p.id},${p.likes_count||0})">❤️ Like</button>
      <button onclick="follow('${p.user_name}')">➕ Follow</button>
    </div>
    `;
  });
}

loadFeed();
</script>

</body>
</html>
