<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.top{
    position:sticky;
    top:0;
    background:#111;
    padding:10px;
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px;
    border-radius:10px;
    border:none;
    background:#4da6ff;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a1a;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
}

small{
    color:#aaa;
}

a{
    color:#4da6ff;
}
</style>
</head>

<body>

<div class="top">
<input id="search" placeholder="Search study..." oninput="load()">
<button onclick="upload()">Upload TXT</button>
<input type="file" id="file" accept=".txt" style="display:none;">
</div>

<div class="container" id="list"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kocnhozdipylotunsidl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvY25ob3pkaXB5bG90dW5zaWRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzA4MTcsImV4cCI6MjA5MzY0NjgxN30.FHCWB-c_Ymdyovv6T6lEKc6U91SoIJx1mixO6dw7Z0I"
);

// 🔐 VALIDACE
function validate(file){
    if(file.type !== "text/plain") return false;
    if(file.size > 10 * 1024 * 1024) return false;
    return true;
}

// 📤 UPLOAD
window.upload = async function(){

    let fileInput = document.getElementById("file");
    fileInput.click();

    fileInput.onchange = async () => {

        let file = fileInput.files[0];
        if(!file) return;

        if(!validate(file)){
            alert("❌ Only TXT max 10MB");
            return;
        }

        let token = prompt("Enter upload token:");

        if(!token){
            alert("❌ Missing token");
            return;
        }

        let fileName = Date.now() + "_" + file.name;

        let { error } = await supabase.storage
            .from("learning-files")
            .upload(fileName, file);

        if(error){
            alert("Upload failed");
            return;
        }

        let url = supabase.storage
            .from("learning-files")
            .getPublicUrl(fileName).data.publicUrl;

        await supabase.from("files").insert({
            name: file.name,
            url,
            size: file.size,
            mime: "text/plain",
            upload_token: token
        });

        load();
    };
};

// 🔎 LOAD + SEARCH
window.load = async function(){

    let q = document.getElementById("search").value.toLowerCase();

    let { data } = await supabase
        .from("files")
        .select("*")
        .order("created_at", { ascending:false });

    let filtered = (data || []).filter(f =>
        f.name.toLowerCase().includes(q)
    );

    document.getElementById("list").innerHTML =
        filtered.map(f=>`
            <div class="card">
                📄 <b>${f.name}</b><br>
                <small>${(f.size/1024).toFixed(1)} KB</small><br>
                <a href="${f.url}" target="_blank">Open</a>
            </div>
        `).join("");
};

load();

</script>

</body>
</html>
